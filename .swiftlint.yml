included:
  - Sources
  - Tests

excluded:
  - "**/.build"
  - "**/Package.swift"
  - Sources/CMegaHAL          # 1998 C, not linted (also nothing to lint — it's C)

line_length:
  warning: 200
  error: 250
file_length:
  warning: 1100
  error: 1500
type_body_length:
  warning: 900
  error: 1500
function_body_length:
  warning: 250
  error: 400
cyclomatic_complexity:
  warning: 50
  error: 80
function_parameter_count:
  warning: 15
  error: 25
nesting:
  type_level: 2

disabled_rules:
  - trailing_whitespace
  - type_name
  - comment_spacing
  - non_optional_string_data_conversion
  - identifier_name  # project's ≥3-char rule lives in AGENTS.md

opt_in_rules:
  - closure_end_indentation
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - overridden_super_call
  - pattern_matching_keywords
  - private_subject
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - weak_delegate
  - yoda_condition

analyzer_rules:
  - unused_declaration
  - unused_import
