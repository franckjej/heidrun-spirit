name: Bug Report
description: Report a bug in heidrun-spirit (the MegaHAL chatterbot)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the details below so the
        issue can be reproduced. For security vulnerabilities, do **not** use
        this form — see the security policy linked on the new-issue page.
  - type: input
    id: version
    attributes:
      label: Version / tag
      description: The tag you ran, or the commit you built from.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Docker
    validations:
      required: true
  - type: input
    id: server
    attributes:
      label: Server it connected to
      description: Which Hotline server (and version) was the bot talking to?
      placeholder: "heidrun-server 1.0.0-rc7 / classic Hotline 1.2.3 / …"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step? Include the chat input if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect, and what happened instead? Include any error output.
      render: text
    validations:
      required: true
